name: Build Anubis APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract and Repair Paths
        run: |
          echo "البحث عن أي ملف مضغوط..."
          # دي الحركة الصايعة: بيدور على أول ملف زيب يقابله مهما كان اسمه
          ZIP_FILE=$(ls *.zip | head -n 1)
          
          if [ -z "$ZIP_FILE" ]; then
            echo "خطأ: مفيش أي ملف ZIP مرفوع في المستودع!"
            ls -R
            exit 1
          fi
          
          echo "لقيت الملف: $ZIP_FILE .. جاري فك الضغط"
          unzip "$ZIP_FILE" -d extracted_files
          
          echo "البحث عن ملف gradlew..."
          GRADLE_PATH=$(find extracted_files -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLE_PATH" ]; then
            echo "خطأ: ملف gradlew مش موجود جوه الزيب!"
            exit 1
          fi
          
          PROJECT_ROOT=$(dirname "$GRADLE_PATH")
          mv $PROJECT_ROOT/* .
          chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Anubis-NVR-Final
          path: "**/build/outputs/apk/debug/*.apk"
          
