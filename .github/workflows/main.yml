name: Build Anubis APK from ZIP

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip Project
        run: |
          # فك ضغط الملف بالاسم اللي انت حددته بالظبط
          unzip Anubis-Android-Server.zip
          
          # التأكد من المسار حتى لو الفولدر جوه الزيب باسم مختلف
          # بننقل كل الملفات للمسار الرئيسي عشان Gradle يشوفها
          find . -maxdepth 2 -name "gradlew" -exec dirname {} + | xargs -I {} mv {}/* . || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Anubis-NVR-Debug-APK
          path: "**/build/outputs/apk/debug/*.apk"
          
