name: Build Anubis APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract and Repair Paths
        run: |
          echo "جاري فك الضغط..."
          unzip Anubis-Android-Server.zip -d extracted_files
          
          echo "البحث عن ملف gradlew لتحديد جذر المشروع..."
          GRADLE_PATH=$(find extracted_files -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLE_PATH" ]; then
            echo "خطأ: لم يتم العثور على ملفات مشروع أندرويد داخل الـ ZIP!"
            exit 1
          fi
          
          PROJECT_ROOT=$(dirname "$GRADLE_PATH")
          echo "تم العثور على المشروع في: $PROJECT_ROOT"
          
          # نقل كل شيء للمسار الرئيسي
          mv $PROJECT_ROOT/* .
          chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Anubis-NVR-Final
          path: "**/build/outputs/apk/debug/*.apk"
          
