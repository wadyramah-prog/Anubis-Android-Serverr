name: Build Anubis APK from ZIP

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip Project
        run: |
          # فك ضغط الملف اللي انت رفعته
          unzip Anubis-Android-Server.zip
          
          # نقل الملفات للمسار الرئيسي عشان جيت هب يشوفها
          find . -maxdepth 2 -name "gradlew" -exec dirname {} + | xargs -I {} mv {}/* . || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Anubis-NVR-Debug-APK
          path: "**/build/outputs/apk/debug/*.apk"
          
