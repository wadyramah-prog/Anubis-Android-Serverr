name: Build Anubis APK from ZIP

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip Project
        run: |
          unzip Anubis-Android-Server.zip
          # هذا السطر للتأكد من نقل الملفات للمكان الصحيح إذا كان الزيب يحتوي على مجلد فرعي
          if [ -d "anubis-android" ]; then mv anubis-android/* .; fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Anubis-NVR-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          
